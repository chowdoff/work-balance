services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: work-balance
      POSTGRES_PASSWORD: work-balance
      POSTGRES_DB: work-balance
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U work-balance"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    expose:
      - "3000"
    environment:
      DATABASE_URL: "postgresql://work-balance:work-balance@db:5432/work-balance"
      NEXTAUTH_SECRET: "change-this-in-production"
      SEED_ADMIN_EMAIL: "admin@company.com"
      SEED_ADMIN_PASSWORD: "admin123"
      SEED_ADMIN_NAME: "系统管理员"
      SEED_WORK_YEAR_NAME: "2026年度"
      SEED_WORK_YEAR_START: "2026-01-01"
      SEED_WORK_YEAR_END: "2026-12-31"
    depends_on:
      db:
        condition: service_healthy

  npm:
    image: jc21/nginx-proxy-manager:latest
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    environment:
      TZ: "Asia/Shanghai"
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    depends_on:
      - app

